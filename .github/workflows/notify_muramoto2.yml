name: 村本海事タイラバ4/12 旬の釣船

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    if: false
    runs-on: ubuntu-latest
    env:
      URL: 'https://airrsv.net/muramotokaiji/calendar/menuDetail/?schdlId=T003F41228'
      GREP_PATTERN: 'このサービスは'
      NOTIFY_ON: 'miss'
      MESSAGE: '今予約いけそう\nhttps://airrsv.net/muramotokaiji/calendar/menuDetail/?schdlId=T003F41228'
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Run notifier
        run: bash command.sh
